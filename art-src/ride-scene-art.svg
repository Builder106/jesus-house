<svg
    class="scene__art"
    data-scene-var
    viewBox="0 0 1440 900"
    preserveAspectRatio="xMidYMid slice"
    aria-hidden="true"
    focusable="false"
    xmlns="http://www.w3.org/2000/svg"
  >
    <defs>
      <linearGradient id="rd-sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fbf8f0" />
        <stop offset="0.7" stop-color="#f6f0e0" />
        <stop offset="1" stop-color="#f1e9d6" />
      </linearGradient>
      <radialGradient id="rd-halo" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#e9c95c" stop-opacity="0.5" />
        <stop offset="0.55" stop-color="#e9c95c" stop-opacity="0.16" />
        <stop offset="1" stop-color="#e9c95c" stop-opacity="0" />
      </radialGradient>
      <linearGradient id="rd-body" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#e4453c" />
        <stop offset="0.55" stop-color="var(--color-jh-red)" />
        <stop offset="1" stop-color="#a81b15" />
      </linearGradient>
      <linearGradient id="rd-glass" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#f2f1fb" />
        <stop offset="1" stop-color="#d9d7ee" />
      </linearGradient>
      <filter id="rd-grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" />
        <feColorMatrix type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.11 0 0 0 0 0.07 0 0 0 0.05 0" />
      </filter>
    </defs>

    <!-- sky -->
    <rect width="1440" height="900" fill="url(#rd-sky)" />

    <!-- sun: quiet disc with a soft halo, no cartoon rays -->
    <circle cx="208" cy="166" r="150" fill="url(#rd-halo)" />
    <circle cx="208" cy="166" r="42" fill="var(--color-jh-gold)" opacity="0.85" />
    <circle cx="208" cy="166" r="52" fill="none" stroke="var(--color-jh-gold)" stroke-width="1.5" opacity="0.35" />

    <!-- clouds: long quiet strata -->
    <g fill="#ffffff" opacity="0.55">
      <path d="M460 150 q30 -22 74 -18 q18 -16 48 -12 q34 -6 54 10 q40 -2 52 16 q-10 12 -54 10 l-160 2 q-22 -2 -14 -8 Z" />
      <path d="M980 110 q24 -18 60 -14 q16 -12 40 -9 q30 -5 46 9 q30 -2 40 13 q-8 10 -44 8 l-128 1 q-18 -1 -14 -8 Z" opacity="0.7" />
    </g>

    <!-- birds: fine distant strokes -->
    <g stroke="var(--color-jh-ink)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.4">
      <path d="M905 215 q9 -9 18 0 q9 -9 18 0" />
      <path d="M965 192 q7 -7 14 0 q7 -7 14 0" />
      <path d="M1015 226 q6 -6 12 0 q6 -6 12 0" />
    </g>

    <!-- distant tree line -->
    <path
      d="M0 506 q60 -16 120 -8 q50 -22 110 -12 q60 -18 120 -6 q70 -16 130 -4 q60 -14 120 -2 q80 -16 140 0 q60 -10 120 2 q70 -12 130 4 q60 -8 120 6 q60 -10 130 6 v60 H0 Z"
      fill="#ddd3b8"
      opacity="0.55"
    />

    <!-- hills: three tonal bands -->
    <path d="M0 542 Q 320 470 700 522 T 1440 496 V 900 H 0 Z" fill="#f2ecdc" />
    <path d="M0 624 Q 380 556 820 606 T 1440 582 V 900 H 0 Z" fill="#ece3cd" />
    <path d="M0 716 Q 430 660 900 700 T 1440 676 V 900 H 0 Z" fill="#e6dcc2" />

    <!-- hedgerow + fence along the far field -->
    <g>
      <path d="M70 596 q40 -14 86 -6 q44 -12 92 -2 l-2 14 -176 2 Z" fill="#cfc5a6" opacity="0.8" />
      <g stroke="#b9ac8c" stroke-width="3" opacity="0.8">
        <line x1="330" y1="586" x2="330" y2="612" />
        <line x1="378" y1="584" x2="378" y2="610" />
        <line x1="426" y1="583" x2="426" y2="609" />
        <line x1="474" y1="584" x2="474" y2="610" />
      </g>
      <line x1="318" y1="594" x2="486" y2="592" stroke="#b9ac8c" stroke-width="2.5" opacity="0.8" />
    </g>

    <!-- elm trees: layered canopies, drawn trunks -->
    <g>
      <path d="M348 612 c-2 -26 -4 -44 -1 -64 m1 64 c-8 -18 -18 -28 -27 -36 m27 36 c5 -22 13 -32 22 -40" fill="none" stroke="#6f6148" stroke-width="6" stroke-linecap="round" />
      <ellipse cx="320" cy="528" rx="46" ry="32" fill="#d4c9a8" />
      <ellipse cx="368" cy="514" rx="52" ry="36" fill="#ddd3b4" />
      <ellipse cx="344" cy="548" rx="40" ry="26" fill="#c8bc97" />
      <ellipse cx="392" cy="540" rx="34" ry="22" fill="#d4c9a8" />
    </g>
    <g opacity="0.92">
      <path d="M1248 632 c-1 -20 -2 -34 0 -50 m0 50 c-6 -13 -13 -20 -20 -26 m20 26 c4 -16 10 -24 17 -30" fill="none" stroke="#6f6148" stroke-width="5" stroke-linecap="round" />
      <ellipse cx="1228" cy="566" rx="36" ry="25" fill="#b9c9a4" />
      <ellipse cx="1266" cy="556" rx="40" ry="28" fill="#a9bf92" />
      <ellipse cx="1246" cy="584" rx="30" ry="20" fill="#9cb284" />
    </g>

    <!-- the meetinghouse on its knoll -->
    <g transform="translate(1010 380)">
      <!-- knoll shadow -->
      <ellipse cx="76" cy="152" rx="130" ry="16" fill="var(--color-jh-ink)" opacity="0.07" />
      <!-- body -->
      <rect x="-2" y="22" width="156" height="126" fill="#ffffff" />
      <!-- clapboard courses -->
      <g stroke="#e8e1d0" stroke-width="1.4">
        <line x1="-2" y1="38" x2="154" y2="38" />
        <line x1="-2" y1="52" x2="154" y2="52" />
        <line x1="-2" y1="66" x2="154" y2="66" />
        <line x1="-2" y1="80" x2="154" y2="80" />
        <line x1="-2" y1="94" x2="154" y2="94" />
        <line x1="-2" y1="108" x2="154" y2="108" />
        <line x1="-2" y1="122" x2="154" y2="122" />
        <line x1="-2" y1="136" x2="154" y2="136" />
      </g>
      <!-- corner boards + watertable -->
      <rect x="-2" y="22" width="7" height="126" fill="#f1ece0" />
      <rect x="147" y="22" width="7" height="126" fill="#e9e2d2" />
      <rect x="-6" y="144" width="164" height="6" fill="#e3dbc8" />
      <!-- pediment with raking cornice -->
      <path d="M-14 24 L76 -32 L166 24 Z" fill="#ffffff" />
      <path d="M-14 24 L76 -32 L166 24 L160 24 L76 -26 L-8 24 Z" fill="#e9e2d2" />
      <rect x="-14" y="22" width="180" height="5" fill="#e3dbc8" />
      <!-- gable fanlight -->
      <path d="M62 6 a14 14 0 0 1 28 0 Z" fill="var(--color-jh-gold)" opacity="0.8" />
      <!-- steeple: base, louvered belfry, spire, finial -->
      <rect x="58" y="-66" width="36" height="36" fill="#ffffff" />
      <rect x="58" y="-66" width="36" height="36" fill="none" stroke="#e3dbc8" stroke-width="2" />
      <g stroke="#cfc6b0" stroke-width="2">
        <line x1="64" y1="-58" x2="88" y2="-58" />
        <line x1="64" y1="-50" x2="88" y2="-50" />
        <line x1="64" y1="-42" x2="88" y2="-42" />
      </g>
      <rect x="54" y="-72" width="44" height="7" fill="#e3dbc8" />
      <path d="M56 -72 L76 -118 L96 -72 Z" fill="var(--color-jh-blue)" />
      <circle cx="76" cy="-122" r="3.5" fill="var(--color-jh-gold)" />
      <line x1="76" y1="-126" x2="76" y2="-136" stroke="var(--color-jh-gold)" stroke-width="2.5" />
      <line x1="71" y1="-131" x2="81" y2="-131" stroke="var(--color-jh-gold)" stroke-width="2.5" />
      <!-- twelve-pane windows -->
      <g>
        <rect x="14" y="84" width="26" height="40" fill="#cfd3e8" stroke="var(--color-jh-blue)" stroke-width="2" opacity="0.9" />
        <g stroke="#f4f2ea" stroke-width="1.4" opacity="0.9">
          <line x1="27" y1="84" x2="27" y2="124" />
          <line x1="14" y1="97" x2="40" y2="97" />
          <line x1="14" y1="110" x2="40" y2="110" />
        </g>
        <rect x="116" y="84" width="26" height="40" fill="#cfd3e8" stroke="var(--color-jh-blue)" stroke-width="2" opacity="0.9" />
        <g stroke="#f4f2ea" stroke-width="1.4" opacity="0.9">
          <line x1="129" y1="84" x2="129" y2="124" />
          <line x1="116" y1="97" x2="142" y2="97" />
          <line x1="116" y1="110" x2="142" y2="110" />
        </g>
      </g>
      <!-- paneled red double door with fanlight -->
      <path d="M52 70 a24 14 0 0 1 48 0 Z" fill="var(--color-jh-gold)" opacity="0.85" />
      <path d="M52 70 a24 14 0 0 1 48 0" fill="none" stroke="#b08a1e" stroke-width="1.5" />
      <rect x="52" y="72" width="48" height="74" fill="var(--color-jh-red)" />
      <rect x="52" y="72" width="48" height="74" fill="none" stroke="#8f1812" stroke-width="2" />
      <line x1="76" y1="72" x2="76" y2="146" stroke="#8f1812" stroke-width="2" />
      <g fill="#b91f18">
        <rect x="58" y="80" width="13" height="26" rx="1.5" />
        <rect x="81" y="80" width="13" height="26" rx="1.5" />
        <rect x="58" y="112" width="13" height="28" rx="1.5" />
        <rect x="81" y="112" width="13" height="28" rx="1.5" />
      </g>
      <!-- steps -->
      <rect x="46" y="146" width="60" height="5" fill="#e3dbc8" />
      <rect x="42" y="151" width="68" height="5" fill="#d9d0ba" />
    </g>

    <!-- the road: tapered perspective ribbon with edge lines -->
    <path
      d="M-60 905 C 240 800, 560 766, 1036 566 L 1058 572 C 640 790, 330 836, -20 940 Z"
      fill="#e7e1d6"
    />
    <path d="M-60 905 C 240 800, 560 766, 1036 566" fill="none" stroke="#cdc4ad" stroke-width="2.5" opacity="0.8" />
    <path d="M-20 940 C 330 836, 640 790, 1058 572" fill="none" stroke="#cdc4ad" stroke-width="2.5" opacity="0.8" />
    <!-- centre dashes, shrinking with distance -->
    <g fill="var(--color-jh-blue)" opacity="0.3">
      <rect x="118" y="856" width="34" height="5.5" rx="2.75" transform="rotate(-17 135 859)" />
      <rect x="306" y="816" width="30" height="5" rx="2.5" transform="rotate(-15 321 818)" />
      <rect x="484" y="778" width="26" height="4.5" rx="2.25" transform="rotate(-16 497 780)" />
      <rect x="652" y="736" width="22" height="4" rx="2" transform="rotate(-20 663 738)" />
      <rect x="800" y="688" width="18" height="3.5" rx="1.75" transform="rotate(-24 809 690)" />
      <rect x="922" y="638" width="14" height="3" rx="1.5" transform="rotate(-26 929 640)" />
    </g>

    <!-- the red car (zoom target = rear door glass, centred at local 0,0) -->
    <g transform="translate(799 627) rotate(-7)">
      <!-- ground shadow -->
      <ellipse cx="6" cy="64" rx="130" ry="13" fill="var(--color-jh-ink)" opacity="0.13" />
      <!-- body: long sedan profile -->
      <path
        d="M-134 46
           c-6 -2 -9 -7 -8 -13 l3 -12 c1 -6 5 -10 11 -11 l22 -4
           c9 -2 14 -4 20 -9 l21 -19 c6 -5 13 -8 21 -8 h62
           c8 0 16 3 22 8 l24 21 c5 4 12 6 19 8 l26 5 c7 1 12 6 13 13 l2 11
           c1 6 -2 11 -8 13 l-12 3 h-225 Z"
        fill="url(#rd-body)"
      />
      <!-- shoulder-line highlight -->
      <path d="M-118 18 h238" stroke="#f2867f" stroke-width="2.5" opacity="0.6" stroke-linecap="round" />
      <!-- rocker shadow -->
      <path d="M-126 46 h252" stroke="#7d120d" stroke-width="5" opacity="0.5" stroke-linecap="round" />
      <!-- glasshouse: rear door window (THE TARGET) + front window, split by B-pillar -->
      <path d="M-32 -21 l8 -16 c2 -4 6 -6 10 -6 h26 c4 0 7 2 9 5 l13 17 Z" fill="url(#rd-glass)" />
      <path d="M-37 -21 c2 -14 8 -22 18 -22 h-12 c-8 0 -25 10 -36 22 Z" fill="url(#rd-glass)" opacity="0.9" />
      <!-- the rear window glass, centred on the group origin -->
      <rect x="-31" y="-20" width="62" height="40" rx="5" fill="url(#rd-glass)" />
      <path d="M-22 -14 l16 28" stroke="#ffffff" stroke-width="5" opacity="0.5" stroke-linecap="round" />
      <path d="M-8 -16 l18 32" stroke="#ffffff" stroke-width="2.5" opacity="0.4" stroke-linecap="round" />
      <!-- window trim -->
      <rect x="-33" y="-22" width="66" height="44" rx="6" fill="none" stroke="#8f1812" stroke-width="3" />
      <!-- B-pillar + door seams -->
      <line x1="36" y1="-22" x2="40" y2="24" stroke="#8f1812" stroke-width="4" />
      <line x1="-38" y1="-18" x2="-42" y2="44" stroke="#8f1812" stroke-width="2" opacity="0.7" />
      <line x1="42" y1="-16" x2="46" y2="44" stroke="#8f1812" stroke-width="2" opacity="0.7" />
      <!-- handles -->
      <rect x="6" y="6" width="16" height="3.5" rx="1.75" fill="#7d120d" />
      <rect x="58" y="6" width="16" height="3.5" rx="1.75" fill="#7d120d" />
      <!-- mirror -->
      <path d="M88 -14 q10 -3 12 4 q1 6 -7 6 q-6 0 -5 -10" fill="#a81b15" />
      <!-- lights -->
      <path d="M124 22 q9 0 12 6 l-2 6 h-12 Z" fill="var(--color-jh-gold)" />
      <path d="M-138 24 h8 v9 h-8 Z" fill="#b3433d" />
      <!-- wheels: arch shadows, tyres, alloys -->
      <path d="M-94 46 a26 26 0 0 1 52 0 Z" fill="#7d120d" opacity="0.55" />
      <path d="M44 46 a26 26 0 0 1 52 0 Z" fill="#7d120d" opacity="0.55" />
      <circle cx="-68" cy="48" r="21" fill="#241f33" />
      <circle cx="-68" cy="48" r="9.5" fill="#cfc9bb" />
      <circle cx="-68" cy="48" r="3" fill="#9a937f" />
      <g stroke="#9a937f" stroke-width="2">
        <line x1="-68" y1="41" x2="-68" y2="55" />
        <line x1="-61" y1="48" x2="-75" y2="48" />
      </g>
      <circle cx="70" cy="48" r="21" fill="#241f33" />
      <circle cx="70" cy="48" r="9.5" fill="#cfc9bb" />
      <circle cx="70" cy="48" r="3" fill="#9a937f" />
      <g stroke="#9a937f" stroke-width="2">
        <line x1="70" y1="41" x2="70" y2="55" />
        <line x1="77" y1="48" x2="63" y2="48" />
      </g>
    </g>

    <!-- paper grain -->
    <rect width="1440" height="900" filter="url(#rd-grain)" opacity="0.5" />
  </svg>
