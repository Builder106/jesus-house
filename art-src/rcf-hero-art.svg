<svg
  class="rcf-hero__art"
  data-scene-var
  viewBox="0 0 1440 900"
  preserveAspectRatio="xMidYMid slice"
  aria-hidden="true"
  focusable="false"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- AESTHETIC_DNA — "Candlelight vespers"
       A dark, quiet dusk field; ONE warm light source (the RCF mark, a flow
       element below the copy — never painted into this background, so it can
       never collide with the CTAs). Atmosphere only: vertical dusk gradient,
       a faint warm breath at the horizon, sparse stars, a barely-there
       treeline ridge, grain. No buildings, no trees, no props. -->
  <defs>
    <linearGradient id="rcf-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#051d15" />
      <stop offset="0.45" stop-color="#0a2f23" />
      <stop offset="0.7" stop-color="#0e3d2c" />
      <stop offset="0.74" stop-color="#0e3d2c" />
      <stop offset="1" stop-color="#06241b" />
    </linearGradient>
    <radialGradient id="rcf-breath" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f4892a" stop-opacity="0.16" />
      <stop offset="0.55" stop-color="#e89a3a" stop-opacity="0.06" />
      <stop offset="1" stop-color="#e89a3a" stop-opacity="0" />
    </radialGradient>
    <filter id="rcf-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer><feFuncA type="linear" slope="0.05" /></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic" />
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#rcf-sky)" />

  <!-- sparse early stars, upper field only -->
  <g fill="#e9f5e6">
    <circle cx="184" cy="112" r="1.6" opacity="0.55" />
    <circle cx="356" cy="208" r="1.2" opacity="0.35" />
    <circle cx="540" cy="84" r="1.4" opacity="0.5" />
    <circle cx="742" cy="166" r="1.1" opacity="0.3" />
    <circle cx="918" cy="74" r="1.5" opacity="0.5" />
    <circle cx="1106" cy="190" r="1.2" opacity="0.4" />
    <circle cx="1268" cy="96" r="1.6" opacity="0.55" />
    <circle cx="1366" cy="236" r="1.1" opacity="0.3" />
    <circle cx="84" cy="278" r="1.2" opacity="0.35" />
    <circle cx="638" cy="282" r="1" opacity="0.28" />
  </g>

  <!-- warm breath at the horizon — the mark's light pooling in the dusk -->
  <ellipse cx="720" cy="662" rx="780" ry="200" fill="url(#rcf-breath)" />

  <!-- treeline ridge: two near-tonal silhouette bands, one small chapel spire -->
  <path
    d="M0 678 Q 130 664 260 670 T 520 666 L 690 670 L 1040 668 Q 1180 660 1290 668 T 1440 672 L 1440 900 L 0 900 Z"
    fill="#072921"
    opacity="0.85"
  />
  <path
    d="M0 700 Q 200 690 400 696 T 820 694 L 1042 696 L 1052 696 L 1056 662 L 1060 656 L 1064 662 L 1068 696 L 1078 696 Q 1260 690 1440 698 L 1440 900 L 0 900 Z"
    fill="#05221a"
  />

  <!-- grain -->
  <rect width="1440" height="900" filter="url(#rcf-grain)" opacity="0.5" />
</svg>
