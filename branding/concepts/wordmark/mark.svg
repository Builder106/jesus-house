<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- RCCG Jesus House, Middletown CT — "JH" monogram.
       The H's lower counter is a New England doorway: red double door on the
       baseline, gold fanlight, crossbar as lintel. The shared left stem runs
       full height so both jambs frame the door; the J hook drops below the
       baseline as a descender with a slab terminal. -->
  <rect width="64" height="64" fill="#FAF7EF"/>
  <g fill="#1C2B4A">
    <!-- shared J/H left stem (full height: left door jamb) -->
    <rect x="24" y="10" width="6" height="39"/>
    <!-- top serif, left stem -->
    <rect x="20.5" y="10" width="13" height="3.2"/>
    <!-- right stem -->
    <rect x="46" y="10" width="6" height="40"/>
    <!-- top serif, right stem -->
    <rect x="42.5" y="10" width="13" height="3.2"/>
    <!-- bottom serif, right stem -->
    <rect x="42.5" y="46.8" width="13" height="3.2"/>
    <!-- crossbar / lintel -->
    <rect x="30" y="25.5" width="16" height="3.5"/>
    <!-- J hook: drops below the baseline as a descender -->
    <path d="M24 46 L30 46 L30 49 A8.5 8.5 0 0 1 13 49 L13 46 L19 46 L19 49 A2.5 2.5 0 0 0 24 49 Z"/>
    <!-- J terminal slab -->
    <rect x="10.5" y="42.8" width="11" height="3.2"/>
  </g>
  <!-- gold fanlight -->
  <path d="M33 35.5 A5 5 0 0 1 43 35.5 Z" fill="#C9A227"/>
  <!-- red double door, on the baseline -->
  <rect x="33" y="35.5" width="10" height="14.5" fill="#B3282D"/>
  <rect x="37.7" y="35.5" width="0.6" height="14.5" fill="#FAF7EF"/>
</svg>
