<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- RCCG Jesus House, Middletown CT — "The Red Door" mark -->
  <!-- Palette: navy #1C2B4A, door red #B3282D (+ shade #8C2125), gold #C9A227, cream #FAF7EF -->

  <!-- cream field -->
  <rect width="64" height="64" rx="12" fill="#FAF7EF"/>

  <!-- pediment -->
  <polygon points="12,20 32,9 52,20" fill="#1C2B4A"/>
  <!-- gold fanlight in the pediment -->
  <path d="M 27.5,19 A 4.5 4.5 0 0 1 36.5,19 Z" fill="#C9A227"/>
  <!-- entablature -->
  <rect x="14" y="20" width="36" height="3.5" fill="#1C2B4A"/>

  <!-- door surround: lintel + pilasters, open at the threshold -->
  <path d="M17 23.5 H47 V56.5 H43.5 V27 H20.5 V56.5 H17 Z" fill="#1C2B4A"/>
  <!-- warm light inside the doorway -->
  <rect x="20.5" y="27" width="23" height="29.5" fill="#C9A227"/>

  <!-- granite steps -->
  <rect x="14" y="56.5" width="36" height="3" fill="#1C2B4A"/>
  <rect x="11" y="59.5" width="42" height="2.5" fill="#1C2B4A"/>

  <!-- light spilling through the gap, down the steps -->
  <polygon points="33,56.5 43.5,56.5 49,62 29.5,62" fill="#C9A227"/>

  <!-- the red door, ajar — hinged at the left jamb, swung inward -->
  <polygon points="20.5,27 34,29.4 34,54.6 20.5,56.5" fill="#B3282D"/>
  <!-- recessed panels -->
  <polygon points="23,31.4 26.4,32.0 26.4,50.7 23,51.2" fill="#8C2125"/>
  <polygon points="28.1,32.4 31.5,33.0 31.5,49.9 28.1,50.4" fill="#8C2125"/>
  <!-- knob -->
  <circle cx="32.6" cy="42.5" r="1" fill="#FAF7EF"/>
</svg>
