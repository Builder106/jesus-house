<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Steeple & Lantern — RCCG Jesus House, Middletown CT -->
  <!-- Navy meetinghouse silhouette, red doors, one gold lantern lit in the belfry -->

  <!-- street / ground line -->
  <rect x="5" y="57" width="54" height="2.6" rx="1.3" fill="#1C2B4A"/>

  <!-- spire -->
  <path d="M32 2.5 L37.2 15 H26.8 Z" fill="#1C2B4A"/>

  <!-- belfry cornice -->
  <rect x="24.5" y="15" width="15" height="2.2" fill="#1C2B4A"/>

  <!-- tower -->
  <rect x="26" y="17.2" width="12" height="14" fill="#1C2B4A"/>

  <!-- gable roof -->
  <path d="M9 39 L32 23 L55 39 Z" fill="#1C2B4A"/>

  <!-- meetinghouse body -->
  <rect x="11" y="38.5" width="42" height="19" fill="#1C2B4A"/>

  <!-- the lantern: single lit window in the belfry -->
  <path d="M28.5 29 V21.8 A3.5 3.5 0 0 1 35.5 21.8 V29 Z" fill="#C9A227"/>

  <!-- clapboard suggestion (cream incisions, left of doors) -->
  <rect x="13.5" y="45.4" width="10.5" height="0.9" fill="#FAF7EF"/>
  <rect x="13.5" y="50.4" width="10.5" height="0.9" fill="#FAF7EF"/>

  <!-- clapboard suggestion (right of doors) -->
  <rect x="40" y="45.4" width="10.5" height="0.9" fill="#FAF7EF"/>
  <rect x="40" y="50.4" width="10.5" height="0.9" fill="#FAF7EF"/>

  <!-- the red doors -->
  <path d="M27.4 57 V47 A4.6 4.6 0 0 1 36.6 47 V57 Z" fill="#B3282D"/>
  <!-- double-door mullion -->
  <rect x="31.7" y="44.6" width="0.6" height="12.4" fill="#FAF7EF"/>
</svg>
