<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="RCCG Jesus House mark: arched red doorway with a fanlight at dawn, the light through the door gap forming an ascending dove">
  <!-- "Door & Dove" — RCCG Jesus House, Middletown CT
       New England meetinghouse doorway: navy surround, dawn in the
       fanlight, red door leaves. The seam of light between the leaves
       widens and becomes an ascending dove. -->

  <!-- Navy door surround (arched frame) -->
  <path fill="#1C2B4A" d="M12 61 V24 A20 20 0 0 1 52 24 V61 Z"/>

  <!-- Cream fanlight (dawn sky) -->
  <path fill="#FAF7EF" d="M16 24 A16 16 0 0 1 48 24 Z"/>

  <!-- Gold half-sun rising in the fanlight -->
  <path fill="#C9A227" d="M25 24 A7 7 0 0 1 39 24 Z"/>

  <!-- Navy transom bar -->
  <rect fill="#1C2B4A" x="16" y="24" width="32" height="2.5"/>

  <!-- Red door leaves -->
  <rect fill="#B3282D" x="16" y="26.5" width="32" height="31"/>

  <!-- Light through the door gap: ascending dove (cream) -->
  <path fill="#FAF7EF" d="
    M 32.0 28.8
    C 33.2 28.8 34.0 29.3 34.2 29.6
    L 35.6 29.6
    C 35.2 30.3 34.6 30.8 34.0 31.0
    C 33.6 31.9 33.6 32.6 33.8 33.4
    C 37.5 31.6 41.5 30.5 45.4 31.2
    C 42.6 33.8 39.0 36.2 34.6 38.6
    C 34.2 41.0 34.0 43.6 33.8 46.0
    C 34.8 48.2 35.9 50.0 36.8 51.6
    C 35.6 52.4 34.4 52.7 33.2 52.8
    L 33.2 57.5
    L 30.8 57.5
    L 30.8 52.8
    C 29.6 52.7 28.4 52.4 27.2 51.6
    C 28.1 50.0 29.2 48.2 30.2 46.0
    C 30.0 43.6 29.8 41.0 29.4 38.6
    C 25.0 36.2 21.4 33.8 18.6 31.2
    C 22.5 30.5 26.5 31.6 30.2 33.4
    C 30.3 32.4 30.3 31.5 30.4 30.6
    C 30.7 29.4 31.2 28.8 32.0 28.8
    Z"/>
</svg>
