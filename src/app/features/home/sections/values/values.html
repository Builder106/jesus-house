<!--
  SCENE 4 — SUNDAY MORNING (values).
  The sanctuary: chancel, lectern, and the great stained-glass arch. A single
  panel (heading + an Embla-powered carousel of the four Sunday beats —
  Welcoming · Rooted · Together · Sending) reads while the scene is pinned;
  then the camera zooms INTO the stained glass and its deep indigo becomes
  the ground of the cathedral section that follows.

  The carousel itself is scroll-independent (swipe, autoplay, or click a
  dot) — unlike the rest of the page's scroll-driven camera, it doesn't need
  scroll distance to advance, so it just sits inside the pinned panel.

  Static baseline (SSR / no-JS / mobile / reduced-motion): a normal section —
  the scene illustrates, the heading + a 2×2 grid of the same four cards read
  below (Embla only initialises in the browser; without it the grid is the
  permanent layout, not just a flash-of-unstyled-carousel).
-->
<section class="scene__stage" data-jh-header-dark="when-veiled" aria-labelledby="values-heading">
  <!-- The illustrated sanctuary (decorative). Window panes are future
       PHOTO SLOTs once the parish photo session happens. -->
  <img
    class="scene__art"
    data-scene-var
    src="/art/values-scene.webp"
    width="2880"
    height="1800"
    alt=""
    aria-hidden="true"
    loading="lazy"
    decoding="async"
  />

  <!-- Heading + carousel panel -->
  <div class="scene__copy relative z-[2] mx-auto w-full max-w-5xl px-6" data-scene-var>
    <!-- max-w-xl, matching ride/audience's panel width (not the 2xl it used
         to be): at 2xl the panel's right edge landed almost exactly on the
         dive target (the cross at x=720 of the 1440-wide art), burying the
         thing the camera is about to zoom into behind the copy for the whole
         read phase. Narrower pulls the right edge clear so the arch is
         visible beside the card while it reads. -->
    <div class="scene__panel max-w-xl rounded-lg border border-jh-rule p-8 sm:p-10">
      <p jhReveal class="jh-eyebrow text-jh-soft">Sunday mornings</p>
      <h2
        id="values-heading"
        jhReveal="80"
        class="mt-4 font-display text-3xl font-semibold leading-tight text-jh-ink sm:text-4xl"
      >
        What Sunday is like
      </h2>
      <p jhReveal="160" class="mt-4 max-w-sm text-lg leading-relaxed text-jh-soft">
        Four things you can count on the moment you walk through our doors.
      </p>

      <!-- The four beats, as an Embla carousel. Each card is an editorial
           index: gold numeral · label kicker · word · line. Before Embla
           initialises (no JS), .embla__container is a plain 2×2 grid — see
           values.css. -->
      <div #emblaRoot class="embla mt-8" aria-label="What Sunday is like">
        <div class="embla__container">
          @for (beat of beats; track beat.word) {
            <div class="embla__slide">
              <div class="scene__beat">
                <span class="scene__beat-num font-display" aria-hidden="true">{{ beat.index }}</span>
                <p class="scene__beat-label jh-eyebrow text-jh-soft">{{ beat.label }}</p>
                <h3 class="scene__beat-word mt-3 font-display font-semibold text-jh-blue">{{ beat.word }}</h3>
                <p class="scene__beat-line mt-3 text-lg leading-relaxed text-jh-ink">
                  {{ beat.line }}
                </p>
              </div>
            </div>
          }
        </div>
      </div>

      <!-- Carousel progress: click a dot to jump to that beat. -->
      <ul class="scene__dots mt-6" aria-label="Choose a beat of Sunday morning">
        @for (beat of beats; track beat.word; let i = $index) {
          <li>
            <button
              type="button"
              class="scene__dot"
              [class.scene__dot--active]="activeIndex() === i"
              [attr.aria-current]="activeIndex() === i ? 'true' : null"
              [attr.aria-label]="'Show: ' + beat.word"
              (click)="scrollToBeat(i)"
            ></button>
          </li>
        }
      </ul>
    </div>
  </div>

  <!-- Camera veil (deep indigo — the glass hands off to the cathedral) -->
  <div class="scene__veil" data-scene-var data-jh-header-dark-veil aria-hidden="true"></div>
</section>
