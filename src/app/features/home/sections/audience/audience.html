<!--
  SCENE 3 — A PLACE FOR YOU (audience).
  Inside now: a warm pew with morning light, a gold glow on the open seat —
  the seat saved for you. The camera move: scroll zooms INTO the open hymnal
  resting on the pew, and its pages resolve into the next scene (Sunday).

  Static baseline (SSR / no-JS / mobile / reduced-motion): a normal section —
  illustration behind, copy panel on top. jhScene adds the pin + camera only
  on desktop with motion allowed.
-->
<section class="scene__stage" aria-labelledby="audience-heading">
  <!-- The illustrated pew scene (decorative). -->
  <svg
    class="scene__art"
    viewBox="0 0 1440 900"
    preserveAspectRatio="xMidYMid slice"
    aria-hidden="true"
    focusable="false"
    xmlns="http://www.w3.org/2000/svg"
  >
    <defs>
      <linearGradient id="pw-wall" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#faf5e8" />
        <stop offset="1" stop-color="#f3ecd9" />
      </linearGradient>
      <linearGradient id="pw-glass" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fbeec2" />
        <stop offset="0.6" stop-color="#f3dfa0" />
        <stop offset="1" stop-color="#e9cd7d" />
      </linearGradient>
      <linearGradient id="pw-wood" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#e9dab4" />
        <stop offset="1" stop-color="#d9c598" />
      </linearGradient>
      <radialGradient id="pw-glow" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#e9c95c" stop-opacity="0.4" />
        <stop offset="0.6" stop-color="#e9c95c" stop-opacity="0.14" />
        <stop offset="1" stop-color="#e9c95c" stop-opacity="0" />
      </radialGradient>
      <filter id="pw-grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" />
        <feColorMatrix type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.11 0 0 0 0 0.07 0 0 0 0.05 0" />
      </filter>
    </defs>

    <!-- wall with paneled wainscot -->
    <rect width="1440" height="900" fill="url(#pw-wall)" />
    <!-- crown moulding — gives the upper wall a horizon line so it doesn't
         read as empty on narrow/portrait crops (where "slice" scales by
         height and shows the full 0–900 span, and the off-centre window
         below gets cropped out of view). -->
    <rect y="64" width="1440" height="8" fill="#e7ddc4" />
    <rect y="72" width="1440" height="3" fill="#fbf7ec" />
    <rect y="400" width="1440" height="240" fill="#f1e9d4" />
    <rect y="396" width="1440" height="7" fill="#e3d9c0" />
    <rect y="400" width="1440" height="3" fill="#fbf7ec" />
    <!-- wainscot stiles + inset panels -->
    <g>
      <g fill="#ece2ca">
        <rect x="36" y="424" width="150" height="180" rx="3" />
        <rect x="222" y="424" width="150" height="180" rx="3" />
        <rect x="408" y="424" width="150" height="180" rx="3" />
        <rect x="594" y="424" width="150" height="180" rx="3" />
        <rect x="780" y="424" width="150" height="180" rx="3" />
        <rect x="966" y="424" width="150" height="180" rx="3" />
        <rect x="1152" y="424" width="150" height="180" rx="3" />
        <rect x="1338" y="424" width="150" height="180" rx="3" />
      </g>
      <g fill="none" stroke="#dccfae" stroke-width="2">
        <rect x="48" y="436" width="126" height="156" rx="2" />
        <rect x="234" y="436" width="126" height="156" rx="2" />
        <rect x="420" y="436" width="126" height="156" rx="2" />
        <rect x="606" y="436" width="126" height="156" rx="2" />
        <rect x="792" y="436" width="126" height="156" rx="2" />
        <rect x="978" y="436" width="126" height="156" rx="2" />
        <rect x="1164" y="436" width="126" height="156" rx="2" />
      </g>
    </g>
    <!-- baseboard -->
    <rect y="612" width="1440" height="14" fill="#e0d4b6" />
    <rect y="612" width="1440" height="3" fill="#f6f0df" />

    <!-- arched window with tracery -->
    <g transform="translate(236 96)">
      <!-- stone surround -->
      <path d="M-14 332 V118 a104 104 0 0 1 208 0 V332 Z" fill="#e7ddc4" />
      <path d="M-6 332 V118 a96 96 0 0 1 192 0 V332 Z" fill="#d9cca9" />
      <!-- glass -->
      <path d="M4 332 V120 a86 86 0 0 1 172 0 V332 Z" fill="url(#pw-glass)" />
      <!-- diamond lattice -->
      <g stroke="#cfa94e" stroke-width="1.2" opacity="0.5">
        <path d="M4 180 l172 86 M4 266 l132 66 M4 94 l172 86 M40 60 l136 68" />
        <path d="M176 180 l-172 86 M176 266 l-132 66 M176 94 l-172 86 M140 60 l-136 68" />
      </g>
      <!-- tracery: two lancets + roundel -->
      <path d="M44 332 V190 a46 46 0 0 1 44 -34 M136 332 V190 a46 46 0 0 0 -44 -34" fill="none" stroke="#b9a878" stroke-width="7" />
      <circle cx="90" cy="104" r="26" fill="none" stroke="#b9a878" stroke-width="7" />
      <line x1="90" y1="156" x2="90" y2="332" stroke="#b9a878" stroke-width="7" />
      <!-- sill -->
      <rect x="-22" y="330" width="224" height="12" fill="#e0d4b6" />
    </g>

    <!-- centred pendant light — horizontally centred (unlike the window,
         which sits left of centre), so it stays visible under any crop
         width and gives narrow/portrait viewports something lit to see in
         the upper wall instead of a bare gradient. Same fixture style as
         the sanctuary's pendant lights (values.html). -->
    <g>
      <line x1="720" y1="0" x2="720" y2="178" stroke="#9c8f6e" stroke-width="2.5" />
      <path d="M696 178 h48 l-9 22 h-30 Z" fill="#c49a25" />
      <circle cx="720" cy="208" r="6" fill="#fdf2cf" />
      <circle cx="720" cy="212" r="22" fill="var(--color-jh-gold)" opacity="0.14" />
    </g>

    <!-- light shafts to the pew -->
    <polygon points="270,438 420,438 930,900 480,900" fill="var(--color-jh-gold)" opacity="0.10" />
    <polygon points="320,438 392,438 760,900 560,900" fill="var(--color-jh-gold)" opacity="0.08" />
    <!-- dust motes -->
    <g fill="var(--color-jh-gold)" opacity="0.3">
      <circle cx="430" cy="500" r="2.2" />
      <circle cx="486" cy="556" r="1.6" />
      <circle cx="540" cy="610" r="2" />
      <circle cx="600" cy="668" r="1.5" />
      <circle cx="520" cy="470" r="1.4" />
      <circle cx="660" cy="720" r="2.2" />
    </g>

    <!-- floor: planks with grain -->
    <rect y="626" width="1440" height="274" fill="#e6d3ae" />
    <g stroke="#d4bd90" stroke-width="2" opacity="0.8">
      <line x1="0" y1="676" x2="1440" y2="676" />
      <line x1="0" y1="736" x2="1440" y2="736" />
      <line x1="0" y1="804" x2="1440" y2="804" />
      <line x1="0" y1="868" x2="1440" y2="868" />
    </g>
    <g stroke="#d4bd90" stroke-width="1.2" opacity="0.5">
      <line x1="140" y1="626" x2="140" y2="676" />
      <line x1="560" y1="676" x2="560" y2="736" />
      <line x1="980" y1="626" x2="980" y2="676" />
      <line x1="360" y1="736" x2="360" y2="804" />
      <line x1="1180" y1="736" x2="1180" y2="804" />
      <line x1="760" y1="804" x2="760" y2="868" />
    </g>
    <!-- light pooling on floor -->
    <ellipse cx="640" cy="730" rx="320" ry="60" fill="var(--color-jh-gold)" opacity="0.07" />

    <!-- rear pew row (perspective) -->
    <g opacity="0.85">
      <rect x="380" y="380" width="700" height="10" rx="3" fill="#cdb98c" />
      <rect x="374" y="388" width="712" height="30" rx="4" fill="url(#pw-wood)" />
      <rect x="374" y="416" width="712" height="6" fill="#c3ad7c" opacity="0.7" />
    </g>

    <!-- the seat glow — a place kept warm for you -->
    <ellipse cx="652" cy="566" rx="190" ry="80" fill="url(#pw-glow)" />

    <!-- front pew: paneled back, cushion, scrolled end caps -->
    <g>
      <!-- backrest cap rail -->
      <rect x="172" y="446" width="1100" height="12" rx="4" fill="#cdb98c" />
      <rect x="172" y="446" width="1100" height="4" rx="2" fill="#f2e7c9" opacity="0.8" />
      <!-- backrest with raised panels -->
      <rect x="180" y="456" width="1084" height="60" fill="url(#pw-wood)" />
      <g fill="#d2bd8e" opacity="0.65">
        <rect x="204" y="466" width="190" height="40" rx="3" />
        <rect x="418" y="466" width="190" height="40" rx="3" />
        <rect x="632" y="466" width="190" height="40" rx="3" />
        <rect x="846" y="466" width="190" height="40" rx="3" />
        <rect x="1060" y="466" width="180" height="40" rx="3" />
      </g>
      <rect x="180" y="514" width="1084" height="4" fill="#c3ad7c" />
      <!-- book rack rail on the backrest -->
      <line x1="220" y1="500" x2="1230" y2="500" stroke="#b9a878" stroke-width="3" opacity="0.7" />
      <!-- closed hymnals resting in the rack -->
      <g>
        <rect x="306" y="474" width="9" height="26" rx="1.5" fill="var(--color-jh-blue)" />
        <rect x="318" y="476" width="8" height="24" rx="1.5" fill="#8f1812" />
        <rect x="772" y="474" width="9" height="26" rx="1.5" fill="var(--color-jh-blue)" />
      </g>
      <!-- seat cushion: red velvet with piping and a gentle sag -->
      <path d="M196 540 q524 10 1048 0 l0 22 q-524 12 -1048 0 Z" fill="var(--color-jh-red)" />
      <path d="M196 540 q524 10 1048 0" fill="none" stroke="#f0837b" stroke-width="2.5" opacity="0.7" />
      <path d="M196 562 q524 12 1048 0" fill="none" stroke="#8f1812" stroke-width="3" opacity="0.8" />
      <!-- seat board + apron -->
      <path d="M186 564 q534 14 1068 0 l0 26 q-534 16 -1068 0 Z" fill="url(#pw-wood)" />
      <path d="M186 588 q534 16 1068 0" fill="none" stroke="#c3ad7c" stroke-width="4" opacity="0.8" />
      <!-- scrolled end caps -->
      <path d="M186 448 q-26 -10 -34 12 q-6 18 12 24 q-22 10 -18 56 q3 34 24 50 l16 6 V448 Z" fill="#d9c598" />
      <path d="M186 448 q-26 -10 -34 12 q-6 18 12 24" fill="none" stroke="#b9a878" stroke-width="3" opacity="0.8" />
      <circle cx="166" cy="472" r="7" fill="none" stroke="#b9a878" stroke-width="2.5" opacity="0.8" />
      <path d="M1258 448 q26 -10 34 12 q6 18 -12 24 q22 10 18 56 q-3 34 -24 50 l-16 6 V448 Z" fill="#cdb98c" />
      <path d="M1258 448 q26 -10 34 12 q6 18 -12 24" fill="none" stroke="#a8966a" stroke-width="3" opacity="0.8" />
      <circle cx="1278" cy="472" r="7" fill="none" stroke="#a8966a" stroke-width="2.5" opacity="0.8" />
      <!-- legs + kneeler -->
      <rect x="236" y="596" width="20" height="92" rx="4" fill="#cdb98c" />
      <rect x="1186" y="596" width="20" height="92" rx="4" fill="#c3ad7c" />
      <rect x="300" y="652" width="840" height="12" rx="6" fill="#cdb98c" opacity="0.9" />
      <rect x="300" y="648" width="840" height="5" rx="2.5" fill="var(--color-jh-red)" opacity="0.7" />
      <!-- pew shadow -->
      <ellipse cx="720" cy="700" rx="560" ry="22" fill="var(--color-jh-ink)" opacity="0.08" />
    </g>

    <!-- the open hymnal — THE CAMERA TARGET (pages centred at local 0,0) -->
    <g transform="translate(920 536)">
      <ellipse cx="0" cy="26" rx="80" ry="10" fill="var(--color-jh-ink)" opacity="0.12" />
      <!-- navy boards -->
      <path d="M-70 6 Q -36 20 0 22 Q 36 20 70 6 L 70 16 Q 36 30 0 32 Q -36 30 -70 16 Z" fill="var(--color-jh-blue)" />
      <path d="M-70 6 Q -36 20 0 22 Q 36 20 70 6" fill="none" stroke="#1b0f4d" stroke-width="2" />
      <!-- gilt page edges -->
      <path d="M-64 2 Q -33 15 0 17 Q 33 15 64 2 l0 5 Q 33 20 0 22 Q -33 20 -64 7 Z" fill="var(--color-jh-gold)" opacity="0.85" />
      <!-- page spreads: curved leaves -->
      <path d="M-62 -18 C -40 -29 -14 -30 -2 -20 L -2 14 C -14 6 -40 7 -62 14 Z" fill="#fffdf6" />
      <path d="M62 -18 C 40 -29 14 -30 2 -20 L 2 14 C 14 6 40 7 62 14 Z" fill="#fffdf6" />
      <path d="M-58 -14 C -38 -24 -16 -25 -4 -17 M58 -14 C 38 -24 16 -25 4 -17" fill="none" stroke="#e8e0c8" stroke-width="1.6" />
      <!-- gutter shadow -->
      <path d="M-2 -20 Q 0 -21 2 -20 L 2 14 Q 0 16 -2 14 Z" fill="#d8d0b6" />
      <!-- two text columns per page, fine lines -->
      <g stroke="#c9c0a8" stroke-width="1.6" stroke-linecap="round">
        <line x1="-52" y1="-12" x2="-32" y2="-15" />
        <line x1="-52" y1="-7" x2="-30" y2="-10" />
        <line x1="-52" y1="-2" x2="-32" y2="-5" />
        <line x1="-52" y1="3" x2="-36" y2="1" />
        <line x1="-26" y1="-16" x2="-8" y2="-18" />
        <line x1="-26" y1="-11" x2="-8" y2="-13" />
        <line x1="-26" y1="-6" x2="-10" y2="-8" />
        <line x1="8" y1="-18" x2="26" y2="-16" />
        <line x1="8" y1="-13" x2="26" y2="-11" />
        <line x1="10" y1="-8" x2="26" y2="-6" />
        <line x1="32" y1="-15" x2="52" y2="-12" />
        <line x1="30" y1="-10" x2="52" y2="-7" />
        <line x1="32" y1="-5" x2="52" y2="-2" />
        <line x1="36" y1="1" x2="52" y2="3" />
      </g>
      <!-- red ribbon, draped with a fold -->
      <path d="M2 -20 C 4 -2 4 10 6 22 q2 10 10 16 l-7 3 q-9 -7 -11 -19 C -2 10 0 -4 2 -20 Z" fill="var(--color-jh-red)" />
      <path d="M16 38 l-7 3 l-2 -6 l7 -2 Z" fill="#8f1812" />
    </g>

    <!-- brass standing candle, right -->
    <g transform="translate(1330 470)">
      <ellipse cx="0" cy="218" rx="34" ry="7" fill="var(--color-jh-ink)" opacity="0.1" />
      <path d="M-26 214 q26 8 52 0 l-6 -10 h-40 Z" fill="#b08a1e" />
      <rect x="-3.5" y="60" width="7" height="146" fill="#c49a25" />
      <circle cx="0" cy="120" r="7" fill="#b08a1e" />
      <path d="M-12 60 h24 l-4 -12 h-16 Z" fill="#c49a25" />
      <rect x="-7" y="14" width="14" height="36" rx="2.5" fill="#fdf6e3" />
      <path d="M0 6 q6 -10 0 -18 q-6 8 0 18" fill="var(--color-jh-gold)" />
      <circle cx="0" cy="-4" r="12" fill="var(--color-jh-gold)" opacity="0.2" />
    </g>

    <!-- paper grain -->
    <rect width="1440" height="900" filter="url(#pw-grain)" opacity="0.5" />
  </svg>

  <!-- Copy panel -->
  <div class="scene__copy relative z-[2] mx-auto w-full max-w-5xl px-6">
    <div class="scene__panel max-w-xl rounded-lg border border-jh-rule p-8 sm:p-10">
      <p jhReveal class="jh-script-eyebrow">Whoever you are</p>

      <h2
        id="audience-heading"
        jhReveal="90"
        class="mt-3 max-w-2xl font-display text-3xl font-semibold leading-tight text-jh-ink sm:text-4xl"
      >
        There's a place for you here.
      </h2>

      <!-- Static tags, not buttons — muted tint (no raised white surface) so they
           don't read as clickable next to the ride scene's live pickup chips. -->
      <ul class="mt-8 flex flex-wrap gap-3" aria-label="People who are welcome at Jesus House">
        @for (audience of audiences; track audience; let i = $index) {
          <li
            [jhReveal]="180 + i * 70"
            jhRevealDir="up"
            class="rounded-full bg-jh-ink/5 px-4 py-2 text-sm font-semibold text-jh-soft"
          >
            {{ audience }}
          </li>
        }
      </ul>

      <p jhReveal="640" class="mt-8 max-w-xl text-lg leading-relaxed text-jh-soft">
        Wesleyan students, Middletown families, and everyone in between — you'll fit right in.
      </p>
    </div>
  </div>

  <!-- Camera veil -->
  <div class="scene__veil" aria-hidden="true"></div>
</section>
