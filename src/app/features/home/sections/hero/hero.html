<!--
  THE PORTAL — a pinned "enter the door" scroll scene.

  Baseline (SSR / no-JS / reduced-motion): a centered static hero — eyebrow,
  "Come and see.", the open red door, subline + CTAs, a scroll cue. No pinning.

  Enhanced (.portal--active, added by the component in the browser when motion
  is allowed): the wrapper grows tall, the stage pins, and scroll progress
  drives --enter (0→1). The copy lifts away, the door scales up and dissolves
  as a warm light grows from the centre — you pass through the doorway — and a
  cream wash carries you "inside", handing off to the journey below.
-->
<section class="portal__stage" aria-labelledby="hero-heading">
  <!-- The light you move toward — a centred warm glow that grows on scroll. -->
  <div class="portal__light" data-scene-var aria-hidden="true"></div>

  <div class="portal__content mx-auto flex w-full max-w-2xl flex-col items-center px-6 text-center">
    <div class="portal__fade" data-scene-var>
      <p jhReveal class="jh-eyebrow text-jh-soft">RCCG &middot; Middletown, Connecticut</p>

      <h1 id="hero-heading" class="jh-hero__headline mt-5 font-display font-semibold text-jh-ink">
        <span class="sr-only">Come and see.</span>
        <span class="jh-hero__words justify-center" aria-hidden="true">
          @for (word of headlineWords; track word; let i = $index) {
            <span class="jh-hero__word">
              <span class="jh-hero__word-inner" [style.--jh-word-i]="i">{{ word }}</span>
            </span>
          }
        </span>
      </h1>
    </div>

    <!-- The doorway you pass through. PHOTO SLOT: meetinghouse exterior. -->
    <div class="portal__art" data-scene-var aria-hidden="true">
      <div class="jh-door">
        <div class="jh-door__scene">
          <div class="jh-door__glow"></div>
          <div class="jh-door__leaf" data-scene-var>
            <span class="jh-door__panel jh-door__panel--top"></span>
            <span class="jh-door__panel jh-door__panel--bottom"></span>
            <span class="jh-door__knob"></span>
          </div>
        </div>
        <div class="jh-door__step"></div>
      </div>
    </div>

    <div class="portal__fade" data-scene-var>
      <p class="jh-hero__subline mt-8 max-w-xl text-lg leading-relaxed text-jh-soft">
        A Redeemed Christian Church of God family on Washington Street. Worship with us this
        Sunday at <span class="font-semibold text-jh-ink">9:00&nbsp;AM</span>.
      </p>

      <div class="mt-8 flex flex-wrap items-center justify-center gap-4">
        <a
          [routerLink]="visitPath"
          class="rounded-full bg-jh-red px-6 py-3 text-sm font-bold text-white transition-colors hover:bg-jh-red/90"
          >Plan your visit</a
        >
        <a
          [href]="rideHref"
          class="rounded-full border border-jh-blue px-6 py-3 text-sm font-bold text-jh-blue transition-colors hover:bg-jh-blue hover:text-white"
          >Need a ride?</a
        >
      </div>
    </div>
  </div>

  <!-- Warm cream wash — carries you "inside" near the end, handing off to the page. -->
  <div class="portal__veil" data-scene-var aria-hidden="true"></div>

  <!-- Scroll-to-enter cue. Desktop (fine pointer): a scroll-mouse whose wheel
       dot drifts down. Touch (coarse pointer): a phone whose finger swipes down.
       Swapped by pointer type in styles.css. Decorative (aria-hidden); the whole
       cue fades as you move through. -->
  <div class="portal__cue jh-hero__cue flex justify-center text-jh-blue" data-scene-var aria-hidden="true">
    <span class="jh-mouse"><span class="jh-mouse__wheel"></span></span>
    <span class="jh-swipe"><span class="jh-swipe__finger"></span></span>
  </div>
</section>
