<header class="sticky top-0 z-40 border-b border-jh-ink/10 bg-jh-cream/95 backdrop-blur-sm">
  <div class="mx-auto flex w-full max-w-5xl items-center justify-between gap-6 px-6 py-3">
    <a routerLink="/" class="flex items-center gap-3">
      <img src="/seal-256.png" alt="RCCG seal" width="40" height="40" class="h-10 w-10" />
      <span class="font-display text-lg font-semibold text-jh-blue">RCCG Jesus House</span>
    </a>
    <nav aria-label="Primary" class="flex items-center gap-5 text-sm font-semibold text-jh-soft sm:gap-7">
      <a
        routerLink="/"
        routerLinkActive="text-jh-blue"
        [routerLinkActiveOptions]="{ exact: true }"
        class="transition-colors hover:text-jh-blue"
        >Home</a
      >
      <a routerLink="/visit" routerLinkActive="text-jh-blue" class="transition-colors hover:text-jh-blue"
        >Plan a Visit</a
      >
    </nav>
  </div>
</header>

<main>
  <router-outlet />
</main>

<footer class="border-t border-jh-ink/10 bg-jh-surface">
  <div class="mx-auto w-full max-w-5xl px-6 py-12">
    <div class="flex flex-col gap-8 sm:flex-row sm:items-start sm:justify-between">
      <div class="flex items-start gap-4">
        <img src="/seal-256.png" alt="RCCG seal" width="48" height="48" class="h-12 w-12" />
        <div>
          <p class="font-display text-lg font-semibold text-jh-blue">RCCG Jesus House, Middletown</p>
          <p class="mt-1 text-sm text-jh-soft">A parish of The Redeemed Christian Church of God</p>
        </div>
      </div>
      <address class="text-sm leading-relaxed text-jh-soft not-italic">
        <p>120 Washington Street<br />Middletown, CT 06457</p>
        <p class="mt-3">
          <a href="tel:+18605184640" class="font-semibold text-jh-blue hover:underline">(860) 518-4640</a><br />
          <a href="mailto:rccgjhmiddletown@gmail.com" class="font-semibold text-jh-blue hover:underline"
            >rccgjhmiddletown&#64;gmail.com</a
          >
        </p>
      </address>
    </div>
    <p class="mt-10 border-t border-jh-ink/10 pt-6 text-xs text-jh-soft">© 2026 RCCG Jesus House, Middletown</p>
  </div>
</footer>
